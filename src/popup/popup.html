<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../../assets/CollegeFinderIcon.png" alt="logo" class="header-logo">
      <div class="header-text">
        <h1 class="title">COLLEGE FINDER</h1>
        <p class="subtitle">v1.0.0 [SYSTEM_READY]</p>
      </div>
    </header>
    
    <!-- College Picker UI -->
    <div id="college-picker-ui">
      <div class="search-box">
        <input type="text" id="search-input" placeholder=">_ SEARCH BY NAME OR CODE..." autocomplete="off" autofocus>
      </div>
  
      <div class="results-container">
        <ul id="results-list" class="results-list">
          <li class="loading">CONNECTING TO DATABANK...</li>
        </ul>
      </div>
    </div>

    <!-- Auto-Filler Dashboard UI -->
    <div id="auto-filler-ui" class="hidden" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;">
      <div style="font-size: 32px; margin-bottom: 10px;">⚡</div>
      <div style="font-size: 18px; color: #0f0; margin-bottom: 10px; font-weight: bold;">O(1) ENGINE ACTIVE</div>
      <p style="font-size: 14px; color: #ccc; margin-bottom: 5px;">Your details are saved and being auto-filled.</p>
      
      <button id="clear-data-btn" class="modal-btn" style="margin-top: 20px; font-size: 12px; width: 100%;">[ CLEAR SAVED DATA ]</button>
    </div>

    
    <footer class="footer">
      <span id="status-message" class="status">AWAITING INPUT...</span>
      <div class="footer-bottom">
        <div class="footer-links">
          <a href="../legal/privacy.html" target="_blank" class="footer-link">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="../legal/terms.html" target="_blank" class="footer-link">Terms of Service</a>
        </div>
        <span class="copyright">© 2026 Anti-Ragging College Picker</span>
      </div>
    </footer>
  </div>



  <script src="popup.js"></script>
</body>
</html>
