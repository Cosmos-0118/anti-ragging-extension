<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../../assets/CollegeFinderIcon.png" alt="logo" class="header-logo">
      <div class="header-text">
        <h1 class="title">COLLEGE FINDER</h1>
        <p class="subtitle">v1.0.0 [SYSTEM_READY]</p>
      </div>
    </header>
    
    <div class="search-box">
      <input type="text" id="search-input" placeholder=">_ SEARCH BY NAME OR CODE..." autocomplete="off" autofocus>
    </div>

    <div class="results-container">
      <ul id="results-list" class="results-list">
        <!-- Results will be injected here -->
        <li class="loading">CONNECTING TO DATABANK...</li>
      </ul>
    </div>
    
    <footer class="footer">
      <span id="status-message" class="status">AWAITING INPUT...</span>
      <div class="footer-bottom">
        <div class="footer-links">
          <a href="../legal/privacy.html" target="_blank" class="footer-link">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="../legal/terms.html" target="_blank" class="footer-link">Terms of Service</a>
        </div>
        <span class="copyright">© 2026 Anti-Ragging College Picker</span>
      </div>
    </footer>
  </div>

  <!-- Debug Scraper Button (Temporary) -->
  <div style="text-align: center; margin-bottom: 10px;">
    <button id="debug-scrape-btn" class="modal-btn" style="width: 90%; font-size: 10px; padding: 4px;">[DEBUG] SCRAPE FORM DETAILS</button>
  </div>

  <!-- Scraper Modal -->
  <div id="scrape-modal-overlay" class="modal-overlay hidden">
    <div class="modal-dialog" style="width: 90%; max-width: 400px;">
      <div class="modal-titlebar">
        <span class="modal-titlebar-text">🕷️ Scraped Details</span>
        <button id="scrape-modal-close-btn" class="modal-titlebar-close">✕</button>
      </div>
      <div class="modal-body" style="padding: 10px;">
        <textarea id="scrape-result-textarea" readonly style="width: 100%; height: 150px; font-family: monospace; font-size: 10px; background: #000; color: #0f0; border: 1px solid #333; padding: 5px;"></textarea>
      </div>
      <div class="modal-actions">
        <button id="scrape-copy-btn" class="modal-btn modal-btn-primary">COPY JSON</button>
        <button id="scrape-close-btn" class="modal-btn">CLOSE</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
