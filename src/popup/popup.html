<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="../../assets/CollegeFinderIcon.png" alt="logo" class="header-logo">
      <div class="header-text">
        <h1 class="title">COLLEGE FINDER</h1>
        <p class="subtitle">v1.0.0 [SYSTEM_READY]</p>
      </div>
    </header>
    
    <div class="search-box">
      <input type="text" id="search-input" placeholder=">_ SEARCH BY NAME OR CODE..." autocomplete="off" autofocus>
    </div>

    <div class="results-container">
      <ul id="results-list" class="results-list">
        <!-- Results will be injected here -->
        <li class="loading">CONNECTING TO DATABANK...</li>
      </ul>
    </div>
    
    <footer class="footer">
      <span id="status-message" class="status">AWAITING INPUT...</span>
      <div class="footer-bottom">
        <div class="footer-links">
          <a href="../legal/privacy.html" target="_blank" class="footer-link">Privacy Policy</a>
          <span class="footer-sep">|</span>
          <a href="../legal/terms.html" target="_blank" class="footer-link">Terms of Service</a>
        </div>
        <span class="copyright">© 2026 Anti-Ragging College Picker</span>
      </div>
    </footer>
  </div>

  <!-- Save Details Modal (Win95-style dialog) -->
  <div id="save-modal-overlay" class="modal-overlay hidden">
    <div class="modal-dialog">
      <div class="modal-titlebar">
        <span class="modal-titlebar-text">💾 Save Details</span>
        <button id="modal-close-btn" class="modal-titlebar-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-icon">📋</div>
        <p class="modal-message">Save this selection for next time?<br><span class="modal-sub">Your college will be auto-filled when you open the anti-ragging form.</span></p>
      </div>
      <div class="modal-actions">
        <button id="modal-save-btn" class="modal-btn modal-btn-primary">SAVE</button>
        <button id="modal-skip-btn" class="modal-btn">SKIP</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
